Name: Build Flutter APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. إعداد الـ Java (مهم جداً لبناء الأندرويد)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # توزيعة مستقرة وموصى بها
          java-version: '17'

      # 3. تثبيت وترتيب بيئة الـ Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          cache: true # تفعيل الكاش لتسريع البناء في المرات القادمة

      # 4. قبول رخص الأندرويد برمجياً
      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      # 5. جلب مكتبات المشروع
      - name: Install dependencies
        run: flutter pub get

      # 6. بناء الـ APK للنسخة النهائية
      - name: Build APK
        run: flutter build apk --release

      # 7. رفع ملف الـ APK الناتج كـ Artifact لتتمكن من تحميله
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
