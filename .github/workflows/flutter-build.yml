name: Build Flutter APK (Auto Create Project)

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable

      # 🔥 أهم خطوة: إنشاء مشروع Flutter تلقائيًا
      - name: Create Flutter project
        run: flutter create .

      # 🔥 استبدال الملفات الخاصة بك
      - name: Overwrite main.dart
        run: |
          rm -f lib/main.dart
          mkdir -p lib
          cp lib/main.dart lib/main.dart || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk
